<!DOCTYPE html><html> <head><meta charset="utf-8"><title>404</title><script>(function(){const base = "/yacms-client-template";
const locales = ["fr","de","ar","zh","ru","en","it"];
const defaultLocale = "fr";

      (function() {
        var p = window.location.pathname;
        if (/\/404\/?$/.test(p)) return;
        // Strip base prefix to isolate the locale segment
        var rest = base ? p.replace(new RegExp('^' + base), '') : p;
        var seg = rest.split('/')[1] || '';
        var locale = locales.indexOf(seg) !== -1 ? seg : defaultLocale;
        window.location.replace(base + '/' + locale + '/404/');
      })();
    })();</script></head> <body> <noscript> <h1>404 - Page Not Found</h1> <p><a href="/">Go to homepage</a></p> </noscript> </body></html>
